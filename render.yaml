services:
  # Backend API
  - type: web
    name: student-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false # Set this sensitive value manually in the Render dashboard

  # Frontend Static Site
  - type: web
    name: student-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: student-backend
          envVarKey: RENDER_EXTERNAL_URL
